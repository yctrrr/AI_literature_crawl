keywords:
  - air pollution
  - climate change
  - energy transition

nature:
  base_url: https://www.nature.com
  journals:
    - ""
  feed_first: true
  feed_urls:
    - https://www.nature.com/nature/articles?format=feed&type=article
    - https://www.nature.com/nclimate/articles?format=feed&type=article
    - https://www.nature.com/nenergy/articles?format=feed&type=article
    - https://www.nature.com/subjects/air-pollution.rss
    - https://www.nature.com/subjects/climate-change.rss
    - https://www.nature.com/subjects/energy.rss
  search_fallback: true
  min_results_before_search_fallback: 5
  search_max_pages_per_keyword: 2
  delay_seconds: 8
  request_timeout_seconds: 30
  user_agent: "LiteratureCrawler/0.1 (+local research workflow)"

paths:
  category_source: "./example_taxonomy"
  archive_root: "./data/archive"

download:
  require_pdf: true
  first_attachment_only: true
  skip_if_no_pdf: true
  max_articles_per_run: 20

browser:
  headless: true
  use_chrome_profile: true
  user_data_dir: ""

llm:
  provider: deepseek
  model: deepseek-v4-pro
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  summarize_by_default: true
  max_pdf_chars: 60000
